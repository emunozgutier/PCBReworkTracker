<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCB Rework Tracker | Modern Tracking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- React CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel" src="/pages/subcomponents/CardHeader.jsx"></script>
    <script type="text/babel" src="/pages/subcomponents/CardListElement.jsx"></script>
    <script type="text/babel" src="/pages/subcomponents/CardList.jsx"></script>
    <script type="text/babel" src="/pages/subcomponents/TitleBar.jsx"></script>
    <script type="text/babel" src="/pages/subcomponents/Footer.jsx"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="glass-background"></div>
    <main class="container">
        <section id="dashboard-root" class="dashboard">
    </main>

    <script type="text/babel">
        {% raw %}
        const { useState, useEffect } = React;

        function Dashboard() {
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [activeCard, setActiveCard] = useState('projects');

            const fetchData = async () => {
                try {
                    const response = await fetch('/api/dashboard');
                    const result = await response.json();
                    setData(result);
                    setLoading(false);
                } catch (err) {
                    setError('Failed to load dashboard data');
                    setLoading(false);
                }
            };

            useEffect(() => {
                fetchData();
            }, []);

            const handleDeleteProject = async (projectId) => {
                if (!confirm('Are you sure you want to delete this project?')) return;
                
                try {
                    const response = await fetch(`/delete_project/${projectId}`, {
                        method: 'POST',
                        headers: {
                            'Accept': 'application/json',
                            'X-Requested-With': 'XMLHttpRequest'
                        }
                    });
                    const result = await response.json();
                    if (result.success) {
                        fetchData();
                    } else {
                        alert(result.message);
                    }
                } catch (err) {
                    alert('Error deleting project');
                }
            };

            if (loading) return <div className="text-center p-5"><div className="spinner-border text-primary" role="status"></div><p className="mt-3 text-white">Loading Dashboard...</p></div>;
            if (error) return <div className="alert alert-danger m-4">{error}</div>;

            return (
                <div className="dashboard-container">
                    <TitleBar />
                    <div className="row g-4 dashboard">
                        {/* Column 1: Projects */}
                        <CardList 
                            icon="📁" 
                            title="Projects" 
                            subtitle={`Total: ${data.projects.length}`}
                            items={data.projects}
                            emptyMessage="No projects yet."
                            isActive={activeCard === 'projects'}
                            onHeaderClick={() => setActiveCard('projects')}
                        >
                            {(project) => (
                                <li className="list-item-with-action">
                                    <span>{project.name}</span>
                                    <div className="delete-form">
                                        <button 
                                            onClick={() => handleDeleteProject(project.id)} 
                                            className="delete-btn" 
                                            title="Delete Project"
                                        >
                                            &times;
                                        </button>
                                    </div>
                                </li>
                            )}
                        </CardList>
                        
                        {/* Column 2: PCBs */}
                        <CardList 
                            icon="📟" 
                            title="Logged PCBs" 
                            subtitle={`Total: ${data.pcbs.length}`}
                            items={data.pcbs}
                            emptyMessage="No PCBs logged."
                            delay="100"
                            isActive={activeCard === 'pcbs'}
                            onHeaderClick={() => setActiveCard('pcbs')}
                        >
                            {(pcb) => (
                                <li>
                                    <div className="item-main">{pcb.number}</div>
                                    <div className="item-sub">{pcb.project_name}</div>
                                </li>
                            )}
                        </CardList>

                        {/* Column 3: Reworks */}
                        <CardList 
                            icon="🔧" 
                            title="Latest Reworks" 
                            subtitle={`Total: ${data.reworks.length}`}
                            items={data.reworks}
                            emptyMessage="No reworks logged."
                            delay="200"
                            isActive={activeCard === 'reworks'}
                            onHeaderClick={() => setActiveCard('reworks')}
                        >
                            {(rework) => (
                                <li>
                                    <div className="item-main">{rework.description.substring(0, 50)}{rework.description.length > 50 ? '...' : ''}</div>
                                    <div className="item-sub">PCB: {rework.pcb_number} | {rework.timestamp}</div>
                                </li>
                            )}
                        </CardList>

                        {/* Column 4: Task Tags */}
                        <CardList 
                            icon="🏷️" 
                            title="Task Tags" 
                            subtitle="Available Categories"
                            items={data.task_tags}
                            emptyMessage="No tags defined."
                            delay="300"
                            isActive={activeCard === 'tags'}
                            onHeaderClick={() => setActiveCard('tags')}
                        >
                            {(tag) => (
                                <li className="tag-item">{tag.name}</li>
                            )}
                        </CardList>
                    </div>
                    <Footer />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('dashboard-root'));
        root.render(<Dashboard />);
        {% endraw %}
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
