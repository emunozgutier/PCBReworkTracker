<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Project | PCB Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="glass-background"></div>
    <main class="container">
        <header class="hero">
            <h1 class="animate-fade-in-down">Create <span>Project</span></h1>
            <p class="subtitle">Enter a unique name for your new PCB project.</p>
        </header>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            <div class="flash-messages">
              {% for category, message in messages %}
                <div class="flash {{ category }}">{{ message }}</div>
              {% endfor %}
            </div>
          {% endif %}
        {% endwith %}

        <section class="form-container">
            <div class="card glass-card animate-zoom-in">
                <form action="{{ url_for('create_project') }}" method="POST">
                    <div class="form-group">
                        <label for="project_name">Project Name</label>
                        <input type="text" id="project_name" name="project_name" placeholder="e.g. NextGen CPU Board" required autofocus>
                    </div>
                    <div class="button-group">
                        <button type="submit" class="btn btn-primary">Create Project</button>
                        <a href="{{ url_for('home') }}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
